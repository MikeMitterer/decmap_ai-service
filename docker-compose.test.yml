# Isolierte Test-Umgebung für Integrationstests gegen echte PostgreSQL + pgvector
#
# Verwendung:
#   docker compose -f docker-compose.test.yml up -d postgres
#   pytest tests/ -v
#   docker compose -f docker-compose.test.yml down -v
#
# Separater Port (5433) um nicht mit der Dev-DB zu kollidieren.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: decisionmap-ai-test-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-test}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-test}
      POSTGRES_DB: ${POSTGRES_DB:-decisionmap_test}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-test} -d ${POSTGRES_DB:-decisionmap_test}"]
      interval: 10s
      timeout: 5s
      retries: 5
